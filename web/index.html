// create a simple web page to display the leaderboard for the World Cup sweepstake

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>World Cup Sweepstake Leaderboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🏆 World Cup Sweepstake Leaderboard</h1>

        <p class="subtitle">
            Live standings based on match predictions
        </p>

        <table>
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Points</th>
                </tr>
            </thead>

            <tbody id="leaderboard">
                <!-- JS fills this -->
            </tbody>
        </table>

        <p id="lastUpdated"></p>

    </div>

    <script src="app.js"></script>
</body>
</html>
